<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css?ver=999">
    <title>Shopping cart</title>
</head>

<body>
    <header>
        <a href="index.html">
        <img src="images/logo.jpg" alt="Logo" width="80" height="80">
        </a>
        <h1>Grocery shop</h1>
        <nav>
            <ul>
                <li><a class="active" href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="carts.html">Cart</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-shell">
            <div class="page-intro">
                <span class="eyebrow">Cart</span>
                <h2>Your Shopping Cart</h2>
                <p>Review your selected items in a cleaner checkout space before placing the order.</p>
            </div>

            <div class="cart-page-actions">
                <button class="cart-toggle" onclick="toggleCart()">View Cart</button>
            </div>

            <div id="cart-container" style="display: none;">
                <div id="cart-list"></div>
                <p id="total-price">Total: $0.00</p>
                <button id="order-btn" disabled>Place Order</button>
                <button id="clear-cart-btn">Clear cart</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Online Grocery Store</p>
    </footer>

    <script src="js/cart.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css?ver=999">
    <title>Home</title>
</head>

<body>
    <header>
        <a href="index.html">
        <img src="images/logo.jpg" alt="Logo" width="80" height="80">
        </a>
        <h1>Grocery shop</h1>
        <nav>
            <ul>
                <li><a class="active" href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="carts.html">Cart</a></li>
                <input type="text" placeholder="Search..">
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="page-shell">
        <div class="page-intro">
            <span class="eyebrow">Checkout</span>
            <h2>Delivery details</h2>
            <p>Complete your order with an elegant, easy-to-read delivery form.</p>
        </div>
        
        <form id="delivery-form">
            <label for="recipient-name">Recipient Name</label>
            <input type="text" id="recipient-name" name="recipient-name" required>

            <label for="street">Street</label>
            <input type="text" id="street" name="street" placeholder="123 Example Street" required>

            <label for="suburb">City/Suburb</label>
            <input type="text" id="suburb" name="suburb" placeholder="Sydney" required>

            <label for="state">State/Territory</label>
            <select id="state" name="state" required>
                <option value="">-- Select State or Territory --</option>
                <option value="NSW">New South Wales (NSW)</option>
                <option value="VIC">Victoria (VIC)</option>
                <option value="QLD">Queensland (QLD)</option>
                <option value="WA">Western Australia (WA)</option>
                <option value="SA">South Australia (SA)</option>
                <option value="TAS">Tasmania (TAS)</option>
                <option value="ACT">Australian Capital Territory (ACT)</option>
                <option value="NT">Northern Territory (NT)</option>
                <option value="Others">Others</option>
            </select>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required placeholder="e.g.,0412345678">

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Place Order</button>
        </form>

        <div id="confirmation-message"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Online Grocery Store</p>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/delivery.js"></script>

</body>
</html>
